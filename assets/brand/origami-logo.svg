<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" aria-labelledby="origami-logo-title origami-logo-desc">
  <title id="origami-logo-title">Origami Underworld</title>
  <desc id="origami-logo-desc">Origami paper crane silhouette over a kanji watermark reading "地獄" (underworld), with the wordmark "ORIGAMI UNDERWORLD" below.</desc>

  <defs>
    <!-- Crane gradient: bone-white to ethereal purple, like folded rice paper under moonlight -->
    <linearGradient id="og-crane-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#fbf3df"/>
      <stop offset="55%" stop-color="#e0c887"/>
      <stop offset="100%" stop-color="#8a5a18"/>
    </linearGradient>
    <!-- Subtle paper fold shading -->
    <linearGradient id="og-fold-shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="rgba(20,14,4,0)"/>
      <stop offset="100%" stop-color="rgba(20,14,4,0.55)"/>
    </linearGradient>
    <!-- Underworld glow — warm lantern, not purple -->
    <radialGradient id="og-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="rgba(212,168,87,0.40)"/>
      <stop offset="60%" stop-color="rgba(140,80,30,0.10)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Wordmark gradient -->
    <linearGradient id="og-word-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f8e8c8"/>
      <stop offset="50%"  stop-color="#d4a857"/>
      <stop offset="100%" stop-color="#9d6f1f"/>
    </linearGradient>
    <!-- Drop shadow filter for the crane -->
    <filter id="og-crane-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Ambient underworld glow behind the kanji -->
  <ellipse cx="300" cy="135" rx="220" ry="100" fill="url(#og-glow)"/>

  <!-- Kanji watermark: 地獄 (jigoku = underworld / hell). Centered behind the crane. -->
  <text x="300" y="172"
        font-family="'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho Pro', serif"
        font-size="160" font-weight="900"
        text-anchor="middle"
        fill="rgba(255,255,255,0.05)"
        stroke="rgba(216,180,254,0.18)" stroke-width="1.2"
        letter-spacing="6">地獄</text>

  <!-- Origami crane silhouette. Constructed from triangular folds — head/neck/body/wings/tail.
       Single composite path so animation is straightforward. -->
  <g filter="url(#og-crane-shadow)" transform="translate(300 130)">
    <!-- Body diamond (folded paper base) -->
    <polygon points="-80,0 0,-30 80,0 0,40" fill="url(#og-crane-grad)" stroke="rgba(20,12,40,0.4)" stroke-width="1.2"/>
    <!-- Body fold shadow (gives 3D crease) -->
    <polygon points="-80,0 0,-30 80,0 0,40" fill="url(#og-fold-shadow)" opacity="0.55"/>
    <!-- Left wing — upswept -->
    <polygon points="-80,0 -10,-15 -110,-55" fill="url(#og-crane-grad)" stroke="rgba(20,12,40,0.5)" stroke-width="1.2"/>
    <polygon points="-80,0 -10,-15 -110,-55" fill="rgba(20,12,40,0.18)"/>
    <!-- Right wing — upswept, mirror -->
    <polygon points="80,0 10,-15 110,-55" fill="url(#og-crane-grad)" stroke="rgba(20,12,40,0.5)" stroke-width="1.2"/>
    <polygon points="80,0 10,-15 110,-55" fill="rgba(20,12,40,0.10)"/>
    <!-- Neck + head (long forward beak) -->
    <polygon points="-10,-15 -80,-55 -70,-40" fill="url(#og-crane-grad)" stroke="rgba(20,12,40,0.5)" stroke-width="1.0"/>
    <!-- Tail (sharp back point) -->
    <polygon points="10,-15 80,-55 70,-40" fill="url(#og-crane-grad)" stroke="rgba(20,12,40,0.5)" stroke-width="1.0"/>
    <!-- Center crease highlight -->
    <line x1="0" y1="-30" x2="0" y2="40" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <!-- Eye dot -->
    <circle cx="-72" cy="-46" r="1.8" fill="#1c0a2e"/>
  </g>

  <!-- Hairline accent above the wordmark -->
  <line x1="120" y1="220" x2="480" y2="220"
        stroke="rgba(200,165,96,0.4)" stroke-width="1"/>
  <line x1="160" y1="223" x2="440" y2="223"
        stroke="rgba(200,165,96,0.65)" stroke-width="0.5"/>

  <!-- Wordmark — ORIGAMI UNDERWORLD in luxe Cinzel Decorative -->
  <text x="300" y="258"
        font-family="'Cinzel Decorative', 'Cinzel', 'Trajan Pro', serif"
        font-size="34" font-weight="900"
        text-anchor="middle"
        fill="url(#og-word-grad)"
        letter-spacing="6">ORIGAMI UNDERWORLD</text>

  <!-- Kanji subtitle: 折り紙地獄 (origami underworld) — small, ethereal teal -->
  <text x="300" y="285"
        font-family="'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho Pro', serif"
        font-size="14" font-weight="400"
        text-anchor="middle"
        fill="rgba(34,211,238,0.85)"
        letter-spacing="8">折り紙地獄</text>
</svg>
