  <script>
  /* SECURITY — same-origin postMessage gate (Mark 2026-06-14). Every game frame (shell/engine/
     panels) loads the others from RELATIVE src = same origin, so every LEGIT cross-frame message
     shares location.origin. This capture-phase guard registers FIRST and drops any message from a
     foreign origin before it reaches ANY handler in this frame — closing the injection surface for
     the ~170-type wire protocol (grant-gold / save-corrupt / action-spoof) from a malicious
     embedder or extension. Empty origin (file://) allowed for local play. Disable: window.__msgGateOff=true. */
  (function(){var T=[/* production allowlist: www + apex of origamiunderworld.com */'https://www.origamiunderworld.com','https://origamiunderworld.com'];try{window.addEventListener('message',function(e){var o=e.origin;if(o!==''&&o!==location.origin&&T.indexOf(o)<0&&!window.__msgGateOff){e.stopImmediatePropagation();}},true);}catch(_){}})();
  </script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:sans-serif}
    #fpv-viewport{position:absolute;inset:0;z-index:0}
    #fpv-viewport iframe{width:100%;height:100%;border:none}
    #ui-viewport{position:absolute;inset:0;z-index:30;pointer-events:none;background:transparent}
    #ui-viewport iframe{width:100%;height:100%;border:none;background:transparent;pointer-events:auto}
    #v8-badge{position:fixed;top:6px;left:10px;z-index:50;pointer-events:none;font:10px monospace;color:rgba(200,169,110,.5);letter-spacing:1.5px}
    /* Bottom-left git version badge — populated by gitVersion.js at boot.
       Lives in the shell at z:50 so it sits ABOVE the panels iframe (z:30)
       and the engine canvas (z:0), and to the LEFT of the thumb panel UI. */
    #git-version-badge{position:fixed;bottom:6px;left:10px;z-index:50;pointer-events:auto;cursor:pointer;font:10px monospace;color:rgba(200,169,110,.45);letter-spacing:1px;max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .2s}
    #git-version-badge:hover{color:rgba(200,169,110,.85)}
    #git-version-badge .gv-sha{color:rgba(255,215,0,.6);font-weight:700}
    #git-version-badge .gv-branch{color:rgba(150,200,255,.4);margin-right:6px}
    #git-version-badge .gv-copy{opacity:.5;margin-right:6px}
    #git-version-badge:hover .gv-copy{opacity:1}
    /* Descent fade — covers the engine iframe during floor reload */
    #descent-fade{position:fixed;inset:0;z-index:9999;background:#000;opacity:0;pointer-events:none;transition:opacity .55s ease;display:flex;align-items:center;justify-content:center;color:rgba(200,169,110,.8);font:600 14px monospace;letter-spacing:3px}
    #descent-fade.active{opacity:1;pointer-events:auto}
    /* ── Atmospheric "spooky grade" overlay (2026-06-09, Mark: "max css, so much shadow, spooky") ──
       FREE compositor-layer cinematic grade over the 3D view: cold-dark vignette + film grain +
       slow "breath". ZERO 3D/GPU-pipeline cost, works in EVERY view (incl. top-down, which bypasses
       the composer). pointer-events:none → clicks pass straight through to the engine (never break
       click-forwarding). z:10 = above the engine canvas (z:0), BELOW the UI panels (z:30) so cards/
       buttons stay crisp & un-graded. Live-tune from the console (no reload):
         const g=document.getElementById('fx-grade');
         g.style.setProperty('--vig','0.72');    // edge darkness   0..1
         g.style.setProperty('--grade','0.45');   // cold-shadow tint 0..1
         g.style.setProperty('--grain','0.09');   // film grain       0..1
         g.classList.toggle('off');                // kill the grade entirely */
    #fx-grade{display:none; /* DISABLED 2026-06-12 (Mark: "that green issue is back… happens when the lights go down") — this green-teal grade (rgba(8,26,30)/rgba(4,12,17)) becomes the dominant tint whenever the 3D scene dims (succubus show, dark rooms). Restore: delete this display:none. */
      position:fixed;inset:0;z-index:10;pointer-events:none;will-change:opacity;
      --vig:0.78;--grade:0.5;--grain:0.078;
      background:
        radial-gradient(ellipse 84% 88% at 50% 45%, rgba(8,26,30,0) 30%, rgba(4,12,17,var(--grade)) 100%),
        radial-gradient(ellipse 74% 80% at 50% 45%, rgba(0,0,0,0) 38%, rgba(0,0,0,var(--vig)) 100%),
        linear-gradient(180deg, rgba(0,4,7,0.34) 0%, rgba(0,0,0,0) 32%, rgba(0,0,0,0) 78%, rgba(0,3,6,0.40) 100%);
      animation:fxBreath 8s ease-in-out infinite;}
    #fx-grade.off{display:none}
    #fx-grade::after{content:'';position:absolute;inset:-60%;pointer-events:none;will-change:transform;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='150' height='150' filter='url(%23n)' opacity='0.55'/></svg>");
      opacity:var(--grain);mix-blend-mode:overlay;animation:fxGrain .7s steps(3) infinite;}
    @keyframes fxBreath{0%,100%{opacity:1}50%{opacity:.94}}
    @keyframes fxGrain{0%{transform:translate(0,0)}33%{transform:translate(-3%,2%)}66%{transform:translate(2%,-3%)}100%{transform:translate(0,0)}}
    /* Her SONG chat bubble — DEDICATED, song text ONLY (driven by SUC_SONG; NOT the Oni-Baba event log). Mark:
       "new text chat bubbles to show her song text". Near the top, kanji over English, with a speech tail. */
    #chat-overlay{position:fixed;left:50%;top:7%;transform:translateX(-50%) translateY(-8px);z-index:55;pointer-events:none;
      max-width:min(560px,86vw);text-align:center;opacity:0;transition:opacity .35s ease, transform .35s ease;
      font-family:'Noto Sans JP','Hiragino Kaku Gothic Pro',system-ui,sans-serif;
      color:#eaf7ff;font-size:clamp(15px,2.3vw,26px);font-weight:600;line-height:1.4;
      padding:14px 26px;border-radius:22px;
      background:linear-gradient(180deg, rgba(20,30,40,0.74), rgba(10,16,22,0.74));
      -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
      border:1px solid rgba(120,210,255,0.30);
      box-shadow:0 10px 34px rgba(0,0,0,0.55), 0 0 28px rgba(90,205,255,0.20), inset 0 0 0 1px rgba(255,255,255,0.04);
      text-shadow:0 2px 10px rgba(0,0,0,.9)}
    #chat-overlay.on{opacity:1;transform:translateX(-50%) translateY(0)}
    #chat-overlay::after{content:'';position:absolute;left:50%;bottom:-8px;width:16px;height:16px;
      transform:translateX(-50%) rotate(45deg);background:rgba(10,16,22,0.74);
      border-right:1px solid rgba(120,210,255,0.30);border-bottom:1px solid rgba(120,210,255,0.30)}
    #chat-overlay .hk-speaker{display:block;font-size:.58em;font-weight:700;color:#7fd6ff;letter-spacing:2px;margin-bottom:4px;opacity:.9}
    #chat-overlay .hk-body{display:block}
  </style>

  <!-- gitVersion.js is generated by .githooks/post-commit on every commit /
       merge / checkout. Gitignored. Falls back to 'dev' if missing. -->
  <script src="gitVersion.js"></script>
  <script>
    (function paintGitVersionBadge(){
        const el = document.getElementById('git-version-badge');
        if (!el) return;
        const v = window.GIT_VERSION;
        if (!v) { el.textContent = 'dev'; return; }
        const branchTag = (v.branch && v.branch !== 'main' && v.branch !== 'master')
            ? `<span class="gv-branch">[${v.branch}]</span>` : '';
        const subjMax = 50;
        const subj = (v.subject || '');
        const subject = subj.length > subjMax ? (subj.slice(0, subjMax) + '…') : subj;
        // 📋 icon goes on the LEFT so user can paste full build info to MC.
        el.innerHTML = `<span class="gv-copy">📋</span>${branchTag}<span class="gv-sha">${v.sha || '?'}</span> — ${subject}`;
        el.title = 'Click to copy build info for MC';
        el.addEventListener('click', () => {
            const sw = navigator.serviceWorker?.controller?.scriptURL || 'none/not-active';
            const payload = [
                '--- MC BUILD DIAGNOSTIC ---',
                `SHA:    ${v.sha}`,
                `Branch: ${v.branch}`,
                `Commit: ${v.subject}`,
                `Built:  ${v.builtAt}`,
                `SW:     ${sw}`,
                `Time:   ${new Date().toISOString()}`,
                '---------------------------',
            ].join('\n');
            const copy = el.querySelector('.gv-copy');
            navigator.clipboard?.writeText(payload)
                .then(() => { if (copy) { copy.textContent = '✓'; setTimeout(() => copy.textContent = '📋', 1500); } })
                .catch(() => { if (copy) { copy.textContent = '✗'; setTimeout(() => copy.textContent = '📋', 1500); } });
        });
    })();
  </script>

  <!-- <script src="NewOrigami.OniBaba.js"></script> -->
  <!-- defer: both files have only runtime consumers (postMessage handlers, gameplay calls) -->
  <script defer src="js/data/i18n.js?v=v8329" integrity="sha384-d6SZ2JBpW7jhr5rzHMvMdi0VHlkVaEh9UblwQf3qonXzK44nDI+Ffa6ujsz3C8HZ"></script>
  <script defer src="js/v8/OniBaba8.js?v=8.1.267" integrity="sha384-osv8vaCCRkiKO/xojykKJz9U7DBKHFMy2GQQg9QH32VLVViJPLc88xxwnEA55ywl"></script>

  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      console.log(`🐉 [TOP_ERROR] ${message} at ${source}:${lineno}:${colno}`);
    };
    const fpv    = document.getElementById('engine-iframe');
    const panels = document.getElementById('panels-iframe');

    // Auto-focus the engine iframe on load to unthrottle the browser's RAF loop immediately
    if (fpv) {
      fpv.onload = () => { try { fpv.contentWindow.focus(); } catch(_) {} };
    }

    function to(frame, msg){ if(frame&&frame.contentWindow) frame.contentWindow.postMessage(msg,'*'); }

    // Key relay
    document.addEventListener('keydown', e=>{
      if(e.repeat||document.activeElement?.tagName==='INPUT') return;
      // TAB is bound to in-game target cycling — block the browser's
      // focus-next-element default so the engine receives the event clean.
      if (e.key === 'Tab') e.preventDefault();
      const msg = {type:'KEY_DOWN',key:e.key,code:e.code,shift:e.shiftKey};
      to(fpv, msg);
      // Also relay to panels so its Enter / arrow / Esc handlers fire
      // even when focus is on the engine iframe (legacy keyboard card
      // selector path). Panels dispatches a synthetic keydown on
      // receipt and tags it _synthetic to prevent a re-post loop.
      to(panels, msg);
    });
    document.addEventListener('keyup', e=>{
      if(document.activeElement?.tagName==='INPUT') return;
      to(fpv,{type:'KEY_UP',key:e.key,code:e.code});
    });

    window.addEventListener('blur', () => {
      to(fpv, { type: 'KEY_CLEAR' });
    });

    let cachedInit = null;

    window.addEventListener('message', e=>{
      const d = e.data; if(!d||!d.type) return;

      // Oni-Baba mutation
      let ev = d;
      // OniBaba8 is primary — she owns the mutation bus
      if(window.oniBaba8?.mutateEvent)  ev = window.oniBaba8.mutateEvent(ev)  ?? ev;
      else if(window.goddessAI?.mutateEvent) ev = window.goddessAI.mutateEvent(ev) ?? ev;
      if(!ev || ev.type==='EVENT_CANCELLED') return;

      switch(ev.type){
        // Player guide open/close → forward to the engine (cues/pauses her song)
        case 'WELCOME_GUIDE_OPEN':
        case 'WELCOME_GUIDE_CLOSE':
          to(fpv, ev); break;
        // Her SONG → its OWN chat bubble (song text only — never the Oni-Baba event/collision messages). Mark.
        case 'SUC_SONG': {
          const _sb = document.getElementById('chat-overlay');
          if (_sb){
            if (ev.show){ _sb.innerHTML = '<span class="hk-speaker">♪ 秘密のダンス</span><span class="hk-body">' + (ev.jp || '') + '<br><span style="opacity:.72;font-style:italic">' + (ev.en || '') + '</span></span>'; _sb.classList.add('on'); clearTimeout(_sb._t); _sb._t = setTimeout(() => _sb.classList.remove('on'), 4500); }
            else { _sb.classList.remove('on'); }
          }
          break;
        }
        // Engine → Panels
        case 'PLAYER_ROT_REALTIME': case 'PLAYER_MOVE': case 'PLAYER_MOVE_STATE':
        case 'RADAR_UPDATE': case 'SYNC_STATS': case 'ADD_CARD': case 'UPDATE_LOOT_CARDS':
        case 'LOOT_CARDS': case 'SHOW_LOOT_UI': case 'SHOW_COMBAT': case 'HIDE_COMBAT':
        case 'HIDE_ALL': case 'COMBAT_STATE_UPDATE': case 'COMBAT_ATTACK': case 'MONSTER_ATTACK':
        case 'SHOW_EXIT': case 'HIDE_EXIT': case 'LCD_EVENT': case 'LOG_EVENT': case 'CAMERA_MODE':
        case 'TOGGLE_INVENTORY': case 'SYNC_INVENTORY': case 'SYNC_UI':
        case 'MISSILE_RECOVERED':
        case 'DEFEAT_BLINK':
        case 'FLOOR_UPDATE':
        case 'SAVE_LIST': case 'SAVE_DONE': case 'INVENTORY_RESTORE':
        case 'MONSTER_HAIKU':
        case 'VENDING_TRANSACTION_REQUEST':
        case 'SHOW_VENDING_CABINET':
        case 'HIDE_VENDING_CABINET':
        case 'SHOW_BLACKJACK':
        case 'HIDE_BLACKJACK':
        case 'BLACKJACK_PAYOUT':
        case 'SLOT_MACHINE_PLAY':
        case 'PERF_MONITOR_UPDATE':
        case 'PIP_DISABLED_STATE':
        case 'ENGINE_LOAD_PROGRESS':
          to(panels, ev); break;
        // Engine → Oni-Baba pipeline (per-monster brain).
        case 'MONSTER_INTEL': case 'MONSTER_SPIRIT_REPORT':
        case 'MONSTER_SOCIAL_DECLARED':
        case 'PANEL_TOUCH':
        case 'PLAYER_IO_ANOMALY':
          // Oni-Baba already listens on window directly — no forwarding
          // needed. (Posted via window.parent.postMessage which reaches
          // the parent window where the OniBaba script hooks.)
          break;
        // PIP_FRAME carries a transferred ImageBitmap — must re-post with transfer list
        case 'PIP_FRAME':
          if(panels && panels.contentWindow){
            if(ev.bitmap) panels.contentWindow.postMessage(ev,'*',[ev.bitmap]);
            else panels.contentWindow.postMessage(ev,'*');
          }
          break;

        // Entity cache
        case 'INIT_ENTITIES':
          cachedInit = ev;
          to(fpv, ev);
          if(window.goddessAI?.handleMessage) window.goddessAI.handleMessage({data:ev});
          break;

        // AI → both
        case 'ONIBABA_STATE':
        case 'AI_UPDATES': case 'AI_DEATH': case 'COMBAT_UPDATE':
        case 'REALITY_SHIFT': case 'KARMA_UPDATE': case 'PIP_AUTO_RESIZE':
          to(fpv, ev); to(panels, ev); break;

        // T0.26 — Oni-Baba's combat brain → Engine
        case 'SYNC_COMBAT_PARAMS':
        // Spirit hauntings — Oni-Baba assigns spirits of fallen goblins to
        // monsters on later floors. Engine boosts the matching monsters.
        case 'HAUNT_ASSIGNMENTS':
          to(fpv, ev); break;

        // T0.26 — Engine → Oni-Baba (already listens via window message)
        // No forwarding needed — these stay in the parent window where
        // oniBaba8 listens directly.
        case 'COMBAT_RECORD':
        case 'MONSTER_AI_STATE':
        case 'PLAYER_POS':
          break;

        // Key relay — panels and engine can both originate KEY_DOWN/UP.
        // Always send to engine; only echo to panels when the origin
        // wasn't already panels (otherwise the panels' Enter handler
        // would fire twice on every native keypress there).
        case 'KEY_DOWN':
        case 'KEY_UP':
          to(fpv, ev);
          if (ev.source !== 'panels') to(panels, ev);
          break;

        // Panels → Engine
        case 'FPV_ACTION': case 'FPV_CHAT_COMMAND': case 'EQUIP_CARD':
        case 'WAGER': case 'ATTACK': case 'RETREAT': case 'PARLEY': case 'SPARE':
        case 'EXPLORE_ROOM': case 'AUTO_EXPLORE': case 'APPROACH_MONSTER':
        case 'TEXT_COMMAND': case 'CHAT_SUBMIT': case 'TOGGLE_AUTOPICKUP':
        case 'PIP_TOGGLE': case 'PIP_ZOOM': case 'PIP_ROTATE': case 'PIP_PAN':
        case 'PIP_CLICK': case 'PIP_SYNC_RECT': case 'PIP_PERSPECTIVE': case 'MOON_PHASE':
        case 'OPEN_FULL_MAP':
        case 'SIDEBAR_OPEN': case 'SIDEBAR_CLOSE':
        case 'MAIN_ZOOM':
        case 'SET_PERF_MODE':
        // i18n locale broadcast — Panels → Engine so monster names refresh live
        case 'LOCALE_CHANGE':
        // Save / Load — panels → engine
        case 'SAVE_NOW': case 'LOAD_NOW': case 'DELETE_SAVE': case 'LIST_SAVES':
        case 'VENDING_TRANSACTION_RESPONSE': case 'KEY_CLEAR': case 'ADD_SYSTEM_LOG':
        case 'VENDING_BUY': case 'VENDING_CABINET_CLOSED':
        case 'BLACKJACK_DEDUCT_GOLD': case 'BLACKJACK_ADD_GOLD': case 'WAGER_RESOLVE':
        case 'QUICK_GAMBLE_START': case 'QUICK_GAMBLE_END':
          // Cache sidebar state locally and forward to engine
          try{
            window.__panelsSidebarOpen = (ev.type === 'SIDEBAR_OPEN');
            const uiViewport = document.getElementById('ui-viewport');
            if (uiViewport) {
              if (ev.type === 'SIDEBAR_OPEN') {
                uiViewport.classList.add('sidebar-open');
              } else if (ev.type === 'SIDEBAR_CLOSE') {
                uiViewport.classList.remove('sidebar-open');
              }
            }
          }catch(e){}
          to(fpv, ev); break;

        // Engine ready
        case 'ENGINE8_READY':
          try {
            window.Engine8 = document.getElementById('engine-iframe').contentWindow.Engine8 || document.getElementById('engine-iframe').contentWindow;
            if (window.oniBaba8) {
              window.oniBaba8.engine = window.Engine8;
            }
          } catch(e) {
            console.warn('Failed to set parent Engine8 reference:', e);
          }
          if(cachedInit) to(fpv, cachedInit);
          to(panels,{type:'LOG_EVENT',logType:'system',text:'⚡ NewOrigami v8 online.'});
          window.__engineReady = true; // v8 constructor harness signal (G-SMOKE)
          // Fade out the descent overlay if a floor transition just landed
          {
            const fade = document.getElementById('descent-fade');
            if(fade && fade.classList.contains('active')){
              setTimeout(() => { fade.classList.remove('active'); fade.textContent = ''; }, 250);
            }
          }
          break;

        // Descent: fade to black, then reload the engine iframe with ?floor=N.
        // The engine wrote hp/karma/floor to sessionStorage before posting this,
        // and reads them back during boot. L7 has no stairs_down so the floor
        // is clamped on the engine side; here we just respect what was sent.
        case 'DESCEND_REQUEST':
          {
            const floor = Math.max(1, Math.min(7, parseInt(ev.floor || 1, 10)));
            const fade = document.getElementById('descent-fade');
            if(fade){
              fade.textContent = `DESCENDING — FLOOR ${floor}`;
              fade.classList.add('active');
            }
            window.__engineReady = false;
            setTimeout(() => {
              fpv.src = `NewOrigami.Engine8.html?floor=${floor}`;
              cachedInit = null; // engine will re-init entities on the new floor
            }, 600);
          }
          break;

        case 'ASCEND_REQUEST':
          {
            const floor = Math.max(1, Math.min(7, parseInt(ev.floor || 1, 10)));
            const fade = document.getElementById('descent-fade');
            if(fade){
              fade.textContent = `ASCENDING — FLOOR ${floor}`;
              fade.classList.add('active');
            }
            window.__engineReady = false;
            setTimeout(() => {
              fpv.src = `NewOrigami.Engine8.html?floor=${floor}`;
              cachedInit = null; // engine will re-init entities on the new floor
            }, 600);
          }
          break;

        // Constructor protocol — Oni-Baba narrates build/validation events
        case 'CONSTRUCTOR_EVENT':
          to(panels, ev);
          break;
      }
    });

    // Un-throttled Parent-to-Child frame driver loop (120 FPS pipeline)
    function parentRenderLoop() {
      requestAnimationFrame(parentRenderLoop);
      if (window.__engineReady && fpv && fpv.contentWindow) {
        fpv.contentWindow.postMessage({ type: 'ENGINE_TICK' }, '*');
      }
    }
    requestAnimationFrame(parentRenderLoop);
  </script>

  <!-- ── Service Worker (offline play, 2026-05-25) ─────────────────────────
       Registers sw.js so the game runs without a network after the first
       visit. Wrapped in feature-detection so file:// or non-HTTPS dev
       contexts silently no-op. Bump the CACHE constant in sw.js to evict
       stale assets after a deploy. -->
  <script>
    // Development Mode: Unregister service workers and clear caches on localhost/127.0.0.1
    const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    if (isDev) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister().then(() => {
              console.log('[sw] Dev Mode: Unregistered service worker');
            });
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(names => {
          for (let name of names) {
            caches.delete(name).then(() => {
              console.log('[sw] Dev Mode: Deleted cache', name);
            });
          }
        });
      }
    } else if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js?v=8.1.43')
          .then(reg => console.log('[sw] registered, scope', reg.scope))
          .catch(err => console.log('[sw] register failed', err && err.message));
      });
    }
  </script>
